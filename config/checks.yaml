# All checks defined in one place
checks:
  s3_block_public_access:
    service: s3
    severity: CRITICAL
    enabled: true
    description: "Block Public Access disabled on S3 bucket"
    remediation: "Enable all Block Public Access settings"
  

  s3_bucket_encryption:
    service: s3
    severity: MEDIUM
    enabled: true
    description: "Bucket encryption not configured"
    remediation: "Enable default encryption with KMS keys"
  

  iam_user_mfa:
    service: iam
    severity: HIGH
    enabled: true
    description: "MFA not enabled for console users"
    remediation: "Enable MFA for all console users"
  

  iam_access_key_age:
    service: iam
    severity: MEDIUM
    enabled: true
    description: "Access key older than threshold"
    remediation: "Rotate access keys regularly"
    max_age_days: 90
     
  iam_admin_privileges:
    service: iam
    severity: CRITICAL
    enabled: true
    description: "User has administrator privileges"
    remediation: "Apply principle of least privilege"
    excluded_users: []  # Can add service accounts
  
  ec2_security_group_ports:
    service: ec2
    severity: CRITICAL
    enabled: true
    description: "Dangerous ports open to 0.0.0.0/0"
    remediation: "Restrict access to specific IPs/security groups"
    dangerous_ports: [22, 3389, 3306, 5432]
    excluded_groups: []

  cloudtrail_logging:
    service: cloudtrail
    severity: CRITICAL
    enabled: true
    description: "CloudTrail not configured or not logging"
    remediation: "Enable CloudTrail logging for all regions"
  
     