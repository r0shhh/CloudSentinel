# All checks defined in one place
checks:
  s3_block_public_access:
    module: scanners.s3_scanner
    function: check_public_access_block
    resource_type: s3_bucket
    service: s3
    severity: HIGH
    cis_control: "2.1.4"
    enabled: true
    description: "Block Public Access disabled on S3 bucket"
    remediation: "Enable all Block Public Access settings"
  

  iam_user_mfa:
    module: scanners.iam_scanner
    function: check_user_mfa
    resource_type: iam_user
    service: iam
    severity: MEDIUM
    cis_control: "1.9"
    enabled: true
    description: "MFA not enabled for console users"
    remediation: "Enable MFA for all console users"
  

  iam_access_key_age:
    module: scanners.iam_scanner
    function: check_access_key_age
    resource_type: iam_user
    service: iam
    severity: MEDIUM
    cis_control: "1.13"
    enabled: true
    description: "Access key older than threshold"
    remediation: "Rotate access keys regularly"
    max_age_days: 90
     
  iam_admin_privileges:
    module: scanners.iam_scanner
    function: check_admin_privileges
    resource_type: iam_user
    service: iam
    severity: HIGH
    cis_control: "1.15"
    enabled: true
    description: "User has administrator privileges"
    remediation: "Apply principle of least privilege"
    excluded_users: []  # Can add service accounts
  
  ec2_security_group_ports:
    module: scanners.ec2_scanner
    function: check_security_groups
    resource_type: none
    service: ec2
    severity: HIGH
    cis_control: ["5.3", "5.4"]
    enabled: true
    description: "Dangerous ports open to 0.0.0.0/0"
    remediation: "Restrict access to specific IPs/security groups"
    dangerous_ports: [22, 3389, 3306, 5432]

  cloudtrail_logging:
    module: scanners.cloudtrail_scanner
    function: check_cloudtrail
    resource_type: none
    service: cloudtrail
    severity: HIGH
    cis_control: "3.1"
    enabled: true
    description: "CloudTrail not configured or not logging"
    remediation: "Enable CloudTrail logging for all regions"
  
  rds_public_access:
    module: scanners.rds_scanner
    function: check_rds_public_access
    resource_type: none
    service: rds
    severity: CRITICAL
    cis_control: "2.2.3"
    enabled: true
    description: "RDS instance publicly accessible"
    remediation: "Disable public accesibility on RDS instances"

  vpc_flow_logs:
    module: scanners.vpc_scanner
    function: check_vpc_flow_logs
    resource_type: none
    service: vpc
    severity: MEDIUM
    cis_control: "3.7"
    enabled: true
    description: "VPC Flow Logs not enabled for all VPCs"
    remediation: "Enable VPC Flow Logs for all VPCs"
    
  ebs_encryption:
    module: scanners.ebs_scanner
    function: check_ebs_encryption
    resource_type: none
    service: ec2
    severity: MEDIUM
    cis_control: "5.1.1"
    enabled: true
    description: "EBS volume is not encrypted"
    remediation: "Enable encryption for all EBS volumes"
