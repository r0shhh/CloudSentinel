name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Force supported Copilot model selection
        run: echo "COPILOT_MODEL=auto" >> "$GITHUB_ENV"
